name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      # After release-please merges and creates a tag,
      # the existing release.yml workflow handles crates.io + Docker publishing.
      # This step updates the README "What's New" section with the latest 3 releases.
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Trigger release workflow
        if: ${{ steps.release.outputs.release_created }}
        # Must use a PAT — the default GITHUB_TOKEN cannot dispatch workflows
        # (HTTP 403: Resource not accessible by integration). The same secret
        # is already used by release.yml for cross-repo dispatches.
        # continue-on-error: if the PAT is expired/invalid the dispatch fails,
        # but the docs-sync steps below must still run — they are independent.
        continue-on-error: true
        run: gh workflow run release.yml --ref ${{ steps.release.outputs.tag_name }}
        env:
          GH_TOKEN: ${{ secrets.GH_DISPATCH_PAT }}

      - name: Sync docs changelog
        if: ${{ steps.release.outputs.release_created }}
        run: python3 scripts/sync-docs-changelog.py

      - name: Update README What's New
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Render only the LATEST release section, cap bullets per
          # subsection (Features, Bug Fixes, ...) to MAX_BULLETS. Anything
          # beyond becomes a single "...and N more" line pointing at the
          # full changelog. Older releases live only in CHANGELOG.md.
          python3 - <<'PYEOF'
          import re

          MAX_BULLETS = 5

          with open("CHANGELOG.md", "r") as f:
              changelog = f.read()

          # Grab everything from the first "## " up to (but not including) the second "## "
          sections = re.split(r"(?m)^## ", changelog)
          # sections[0] is the "# Changelog" preamble; sections[1] is the latest release body
          latest = "## " + sections[1].rstrip()

          # Walk subsections (### ...) and truncate their bullet lists
          out_lines = []
          current_bullets = []

          def flush(buf):
              if not buf:
                  return []
              if len(buf) <= MAX_BULLETS:
                  return buf
              kept = buf[:MAX_BULLETS]
              extra = len(buf) - MAX_BULLETS
              kept.append(f"* …and {extra} more — see [full changelog](CHANGELOG.md)")
              return kept

          for line in latest.splitlines():
              if line.startswith("* "):
                  current_bullets.append(line)
              else:
                  out_lines.extend(flush(current_bullets))
                  current_bullets = []
                  out_lines.append(line)
          out_lines.extend(flush(current_bullets))

          changes = "\n".join(out_lines).strip()
          # Convert CHANGELOG h2 (## v0.x.x) to h3 (### v0.x.x) for README
          changes = re.sub(r"^## ", "### ", changes, flags=re.MULTILINE)

          with open("README.md", "r") as f:
              readme = f.read()

          # Replace everything between "## What's New" and "[Full changelog"
          pattern = r"(## What's New\n\n).*?(\n\[Full changelog)"
          replacement = rf"\1{changes}\n\2"
          readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(readme)
          PYEOF

          # Commit the README update
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/docs/changelog.md
          git diff --cached --quiet || git commit -m "docs: sync changelog and update README What's New section"
          git push
